    <script>
      (function() {
        try {
          var s = localStorage.getItem('paypilot-theme');
          if (s) {
            var p = JSON.parse(s);
            if (p && p.state && p.state.theme === 'dark') {
              document.documentElement.classList.add('dark');
            }
          }
        } catch (e) {}
      })();
    </script>
